<div class="view-header"><h2>🧮 Calculadora Científica</h2><p>Calculadora científica completa con funciones trigonométricas, logarítmicas, eléctricas y conversiones.</p></div>
<div id="calc-display" style="background:var(--surface2);border-radius:12px;padding:16px 20px;margin-bottom:12px;min-height:72px;text-align:right">
  <div id="calc-expr" style="font-size:0.8rem;color:var(--text-dim);min-height:20px;font-family:monospace;word-break:break-all"></div>
  <div id="calc-val"  style="font-size:2rem;font-weight:700;font-family:monospace;letter-spacing:-0.03em;color:var(--text)">0</div>
</div>
<div id="calc-mode-bar" style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
  <button id="cm-deg" class="btn btn-primary" style="padding:6px 14px;font-size:0.8rem">DEG</button>
  <button id="cm-rad" class="btn btn-secondary" style="padding:6px 14px;font-size:0.8rem">RAD</button>
  <button id="cm-2nd" class="btn btn-secondary" style="padding:6px 14px;font-size:0.8rem">2nd</button>
  <span id="calc-mem-disp" style="padding:6px 14px;font-size:0.8rem;color:var(--text-dim)">M=0</span>
</div>
<div id="calc-buttons" style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px"></div>
<div style="margin-top:12px;font-size:0.75rem;color:var(--text-dim)">Constantes: π=3.14159… | e=2.71828… | c=299792458 m/s | h=6.626×10⁻³⁴ J·s | k=1.381×10⁻²³ J/K | q=1.602×10⁻¹⁹ C</div>
<div id="calc-history-strip" style="font-size:0.75rem;color:var(--text-dim);min-height:30px;overflow-x:auto;white-space:nowrap;padding:4px 0;margin-bottom:8px"></div>
